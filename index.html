<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1a0f08" />
  <title>Number Puzzle Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dark">

<!-- ============ LOADING SCREEN ============ -->
<div id="loading-screen" class="loader">
  <img src="assets/icons/logo.png" alt="Logo" class="loader-logo" />
</div>

<div id="app" class="app hidden">
  <!-- Backdrop for panels -->
  <div id="panel-backdrop" class="panel-backdrop"></div>

  <!-- LEFT INFO PANEL -->
  <aside id="info-panel" class="side-panel side-panel-left">
    <header class="panel-header">
      <div class="panel-title-wrap">
        <span class="icon-sm" data-icon="info"></span>
        <h2>Information</h2>
      </div>
      <button class="icon-btn" data-close-panel="info-panel" aria-label="Close" data-icon="close"></button>
    </header>
    <nav class="panel-list">
      <a href="pages/about.html" target="_blank"><span data-icon="about"></span> About The App</a>
      <a href="pages/guide.html" target="_blank"><span data-icon="help"></span> How To Play</a>
      <a href="pages/privacy.html" target="_blank"><span data-icon="lock"></span> Privacy Policy</a>
      <div class="panel-divider"></div>
      <div class="panel-actions">
        <button class="btn btn-ghost" id="btn-export-data"><span data-icon="save"></span> Export Data</button>
        <button class="btn btn-ghost" id="btn-import-data"><span data-icon="upload"></span> Import Backup</button>
        <input type="file" id="import-file" accept="application/json" hidden />
        <button class="btn btn-danger" id="btn-reset-data"><span data-icon="delete"></span> Reset All Data</button>
      </div>
    </nav>
  </aside>

  <!-- RIGHT DASHBOARD PANEL -->
  <aside id="dashboard-panel" class="side-panel side-panel-right">
    <header class="panel-header">
      <div class="panel-title-wrap">
        <span class="icon-sm" data-icon="statistics"></span>
        <h2>Dashboard</h2>
      </div>
      <button class="icon-btn" data-close-panel="dashboard-panel" aria-label="Close" data-icon="close"></button>
    </header>
    <div class="panel-body" id="dashboard-body"></div>
  </aside>

  <!-- ============ HOME SCREEN ============ -->
  <section id="screen-home" class="screen screen-home active">
    <header class="topbar">
      <button class="icon-btn" id="open-info" data-icon="menu"></button>
      <div class="brand">
        <img src="assets/icons/logo.png" alt="" />
        <h1>PUZZLE <span>PRO</span></h1>
      </div>
      <button class="icon-btn" id="open-dashboard" data-icon="statistics"></button>
    </header>

    <main class="home-main">
      <div class="preview-container">
        <div class="preview-frame">
          <div id="preview-board" class="preview-board"></div>
        </div>
        <p class="preview-label">TARGET SEQUENCE</p>
      </div>

      <div class="settings-grid">
        <!-- Size -->
        <div class="setting-card">
          <div class="setting-info">
            <span class="setting-icon" data-icon="grid"></span>
            <label>Grid Size</label>
          </div>
          <div class="picker">
            <button class="picker-arrow" data-picker="size" data-dir="-1" data-icon="prev"></button>
            <span class="picker-value" id="picker-size">3 × 3</span>
            <button class="picker-arrow" data-picker="size" data-dir="1" data-icon="next"></button>
          </div>
        </div>

        <!-- Mode -->
        <div class="setting-card">
          <div class="setting-info">
            <span class="setting-icon" data-icon="number"></span>
            <label>Game Mode</label>
          </div>
          <div class="picker">
            <button class="picker-arrow" data-picker="mode" data-dir="-1" data-icon="prev"></button>
            <span class="picker-value" id="picker-mode">Number</span>
            <button class="picker-arrow" data-picker="mode" data-dir="1" data-icon="next"></button>
          </div>
        </div>

        <!-- Sequence / Preset -->
        <div class="setting-card">
          <div class="setting-info">
            <span class="setting-icon" data-icon="classic"></span>
            <label id="label-sequence">Sequence</label>
          </div>
          <div class="picker">
            <button class="picker-arrow" data-picker="sequence" data-dir="-1" data-icon="prev"></button>
            <span class="picker-value" id="picker-sequence">Classic</span>
            <button class="picker-arrow" data-picker="sequence" data-dir="1" data-icon="next"></button>
          </div>
        </div>

        <!-- Difficulty -->
        <div class="setting-card">
          <div class="setting-info">
            <span class="setting-icon" data-icon="warning"></span>
            <label>Difficulty</label>
          </div>
          <div class="picker">
            <button class="picker-arrow" data-picker="difficulty" data-dir="-1" data-icon="prev"></button>
            <span class="picker-value" id="picker-difficulty">Medium</span>
            <button class="picker-arrow" data-picker="difficulty" data-dir="1" data-icon="next"></button>
          </div>
        </div>

        <!-- Photo Upload (Specific) -->
        <div class="setting-card photo-only hidden" id="photo-upload-card">
          <button class="btn btn-full btn-ghost" id="btn-pick-photo">
            <span data-icon="upload"></span> Custom Photo
          </button>
          <input type="file" id="photo-input" accept="image/*" hidden />
        </div>
      </div>

      <div class="home-actions">
        <button class="btn btn-primary btn-large" id="btn-play">
          <span data-icon="play"></span> New Game
        </button>
        <button class="btn btn-resume hidden" id="btn-continue">
          <div class="resume-content">
            <span class="resume-title"><span data-icon="continue"></span> Resume</span>
            <span class="resume-meta" id="resume-meta">4×4 • Classic</span>
          </div>
          <span data-icon="next"></span>
        </button>
      </div>
    </main>
  </section>

  <!-- ============ GAME SCREEN ============ -->
  <section id="screen-game" class="screen screen-game">
    <header class="topbar game-topbar">
      <button class="icon-btn" id="btn-back-home" data-icon="back"></button>
      <div class="hud">
        <div class="hud-item">
          <span data-icon="moves"></span>
          <span id="hud-moves">0</span>
        </div>
        <div class="hud-item">
          <span data-icon="timer"></span>
          <span id="hud-time">00:00</span>
        </div>
      </div>
      <button class="icon-btn" id="btn-pause" data-icon="pause"></button>
    </header>

    <main class="game-main">
      <div id="board-container" class="board-container">
        <div id="board" class="board"></div>
      </div>

      <div class="game-controls">
        <button class="ctrl-btn" id="btn-hint"><span data-icon="hint"></span><span>Hint</span></button>
        <button class="ctrl-btn" id="btn-undo"><span data-icon="undo"></span><span>Undo</span></button>
        <button class="ctrl-btn" id="btn-redo"><span data-icon="redo"></span><span>Redo</span></button>
        <button class="ctrl-btn" id="btn-shuffle"><span data-icon="shuffle"></span><span>Shuffle</span></button>
        <button class="ctrl-btn" id="btn-restart"><span data-icon="restart"></span><span>Restart</span></button>
        <button class="ctrl-btn" id="btn-fullscreen"><span data-icon="fullscreen"></span><span>Full</span></button>
      </div>
    </main>
  </section>

  <!-- ============ OVERLAYS ============ -->
  <div id="pause-overlay" class="modal hidden">
    <div class="modal-card">
      <span class="modal-icon" data-icon="pause"></span>
      <h2>Game Paused</h2>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-resume">Continue</button>
        <button class="btn btn-ghost" id="btn-pause-home">Exit</button>
      </div>
    </div>
  </div>

  <div id="confirm-dialog" class="modal hidden">
    <div class="modal-card">
      <h2 id="confirm-title">Are you sure?</h2>
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="confirm-cancel">No</button>
        <button class="btn btn-danger" id="confirm-ok">Yes</button>
      </div>
    </div>
  </div>

  <section id="screen-result" class="screen screen-result">
    <canvas id="fx-canvas" class="fx-canvas"></canvas>
    <div class="result-card">
      <div class="trophy-icon" data-icon="success"></div>
      <h2>Magnificent!</h2>
      <div class="result-stats" id="result-stats"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-play-again">Play Again</button>
        <button class="btn btn-ghost" id="btn-share"><span data-icon="share"></span> Share</button>
      </div>
    </div>
  </section>

  <div id="toast-stack" class="toast-stack"></div>
</div>

<script src="script.js"></script>
</body>
</html>
